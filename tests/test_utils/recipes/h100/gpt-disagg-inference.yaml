type: basic
format_version: 1
maintainers: [mcore]
loggers: [stdout]
spec:
  name: '{test_case}_{environment}_{platforms}'
  model: gpt
  build: mcore-pyt-{environment}
  nodes: 1
  gpus: 2
  n_repeat: 1
  platforms: dgx_a100
  script_setup: |
    unset https_proxy
    echo "machine gitlab-master.nvidia.com login okoenig password $RO_API_TOKEN" | tee -a /root/.netrc

    # Checkout latest
    cd /opt
    rm -rf /opt/megatron-lm; mkdir megatron-lm; cd megatron-lm
    git init
    git remote add origin $MCORE_REPO
    git fetch origin '+refs/merge-requests/*:refs/remotes/merge-requests/*'
    git fetch origin $MCORE_MR_COMMIT
    git checkout $MCORE_MR_COMMIT
    git rev-parse HEAD
    # Checkout backwards-ref
    cd /opt
    rm -rf /opt/megatron-lm-legacy; mkdir megatron-lm-legacy; cd megatron-lm-legacy
    git init
    git remote add origin $MCORE_REPO
    git fetch origin $MCORE_BACKWARDS_COMMIT
    git checkout $MCORE_BACKWARDS_COMMIT
    git rev-parse HEAD
    rm -rf megatron; cp -a /opt/megatron-lm/megatron ./
  script: |-
    ls
    cd /opt/megatron-lm

    ARGUMENTS=(
        "CHECKPOINT_LOAD_PATH=/mnt/artifacts"
        "CHECKPOINT_SAVE_PATH=/tmp/checkpoints"
        "DATA_PATH=/mnt/artifacts/"
        "DATA_CACHE_PATH=/workspace/data/cache" 
        "TRAINING_SCRIPT_PATH=examples/inference/gpt/gpt_dynamic_inference.py"
        "TRAINING_PARAMS_PATH=./tests/functional_tests/test_cases/{model}/{test_case}/model_config.yaml"
        "GOLDEN_VALUES_PATH=./tests/functional_tests/test_cases/{model}/{test_case}/golden_values_{environment}_{platforms}.json"
        "OUTPUT_PATH={assets_dir}"
        "TENSORBOARD_PATH={assets_dir}/tensorboard"
        "INFERENCE_OUTPUT_PATH={assets_dir}/golden_values_{environment}_{platforms}.json"
        "N_REPEAT={n_repeat}"
        "ENABLE_LIGHTWEIGHT_MODE=${{ENABLE_LIGHTWEIGHT_MODE}}"
        "RECORD_CHECKPOINTS=${{RECORD_CHECKPOINTS}}"
    )

    bash ./tests/functional_tests/shell_test_utils/run_ci_test.sh ${{ARGUMENTS[@]}}

products:
  # Matched prefill/decode (TP1 PP1) over data-parallel size 2.
  # Disagg is token-identical to the colocated prefix_caching run, so its
  # golden values are copied from that test. Marked -broken until the
  # golden values are confirmed on the first CI run, then flip to [mr].
  - test_case: [gpt_dynamic_inference_disagg_tp1_pp1_583m]
    products:
      - environment: [dev]
        scope: [mr-broken, mr-github-broken] # enable after confirming golden values
        platforms: [dgx_h100]
  # Heterogeneous prefill TP2 -> decode TP1. Needs the inference
  # process-group construction (separate MR); kept here, disabled, so it
  # is one scope-flip away from running once that lands.
  - test_case: [gpt_dynamic_inference_disagg_tp2_to_tp1_583m]
    products:
      - environment: [dev]
        scope: [mr-broken, mr-github-broken] # needs inference PG construction (separate MR)
        platforms: [dgx_h100]
